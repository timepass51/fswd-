<body ng-controller="myController">

<div class="container">

    <h1>Course Management System</h1>

    
    <div class="card">
        <h2>{{editMode ? "Update Course" : "Add Course"}}</h2>

        <input type="text" ng-model="course.name" placeholder="Course Name">
        <input type="text" ng-model="course.instructor" placeholder="Instructor">
        <br>
        <button class="add-btn" ng-if="!editMode" ng-click="addCourse()">Add</button>
        <button class="update-btn" ng-if="editMode" ng-click="updateCourse()">Update</button>

        <p class="error">{{error}}</p>
        <p class="success">{{success}}</p>
    </div>

    <div class="card">
        <h2>Course List</h2>
        <div class="course-item" ng-repeat="c in courses">
            <div>
                <b>{{c.name}}</b><br>
                <small>{{c.instructor}}</small>
            </div>

            <div>
                <button class="edit-btn" ng-click="editCourse(c)">Edit</button>
                <button class="delete-btn" ng-click="deleteCourse(c._id)">Delete</button>
            </div>
        </div>
    </div>
</div>
</body>
